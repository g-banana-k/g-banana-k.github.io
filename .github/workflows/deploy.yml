name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # リポジトリのコードをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v3

      # Node.js のセットアップ
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 依存関係のインストール
      - name: Install dependencies
        run: npm ci

      # TypeScript でビルド & Markdown から HTML 生成 (ssg)
      - name: Run build process
        run: npm run ssg

      # site_dist の中身を deploy ブランチにコピーしてコミット & プッシュ
      - name: Deploy to deploy branch
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

          # deploy ブランチをチェックアウト (存在しなければ作成)
          git fetch origin deploy || git checkout --orphan deploy
          git checkout deploy

          # site_dist の中身でブランチを上書き
          rm -rf ./*
          cp -r site_dist/* .
          git add .
          git commit -m "Deploy from main branch: ${{ github.sha }}"
          git push -f origin deploy
